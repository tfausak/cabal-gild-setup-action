name: Rebuild dist
on: pull_request

permissions:
  contents: write

jobs:
  rebuild:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Rebuild dist
